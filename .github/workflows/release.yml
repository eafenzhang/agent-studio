name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # This workflow is triggered when build.yml pushes a version tag.
  # Since build.yml already creates the release with installer assets,
  # this workflow only acts as a fallback if the release was skipped/missing.
  ensure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check if release needs assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO="${{ github.repository }}"

          if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
            # Check if release already has assets
            ASSET_COUNT=$(gh release view "$TAG" --repo "$REPO" --json assets -q '.assets | length')
            if [ "$ASSET_COUNT" -gt 0 ]; then
              echo "✅ Release $TAG already has $ASSET_COUNT assets, nothing to do"
              exit 0
            fi
            echo "⚠️  Release $TAG exists but has no assets"
          fi

          echo "⚠️  Release $TAG missing or empty — build.yml should handle this on next push"
