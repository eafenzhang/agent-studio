name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build Tauri
        run: npm run tauri build

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Agent Studio ${{ github.ref_name }}
          body: |
            ## Agent Studio ${{ github.ref_name }}

            ### ✨ 新功能
            - 任务中心 — 创建、管理、追踪 AI 任务
            - 增强聊天渲染 — 代码块复制、推理链展示
            - 会话模式定义 — 行动 / 规划 / 自主
            - Agent 多轮自思考支持（thinking/tips/plan 事件）

            ### 🔧 架构改进
            - 会话模块重构 — 统一 WS 协议、消除数据双写
            - WebSocket 事件对齐后端真实 message.stream 协议
            - 共享 ChatInputPanel 组件（消除 400 行重复代码）
            - ThinkingBlock 组件展示 Agent 推理链

            ### 🐛 Bug 修复
            - TaskProgressPanel 空状态/假步骤
            - 删除 300+ 行死代码（chat-service.js / ChatInput.tsx）
          files: ./src-tauri/target/release/bundle/nsis/*.exe
          fail_on_unmatched_files: true
