name: Build Agent Studio

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with: { node-version: '22' }

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Build Tauri
        run: npm run tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: installer

      - name: Bump version and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"

          # Bump version in all config files
          node -e "
            ['package.json',
             'src-tauri/tauri.conf.json'].forEach(f => {
              let c = require('fs').readFileSync(f,'utf8');
              c = c.replace(/\"version\": \"$VERSION\"/g, '\"version\": \"$NEW_VERSION\"');
              require('fs').writeFileSync(f,c);
            });
            let c = require('fs').readFileSync('src-tauri/Cargo.toml','utf8');
            c = c.replace(/^version = \"$VERSION\"/m, 'version = \"$NEW_VERSION\"');
            require('fs').writeFileSync('src-tauri/Cargo.toml',c);
          "

          # Commit, tag, release
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to v$NEW_VERSION" || true
          git tag -f "v$NEW_VERSION"
          git push origin master
          git push origin -f "v$NEW_VERSION"

          INSTALLER=$(ls *.exe 2>/dev/null | head -1)
          if [ -n "$INSTALLER" ]; then
            gh release create "v$NEW_VERSION" "$INSTALLER" \
              --generate-notes || true
          else
            echo "No installer found"
            gh release create "v$NEW_VERSION" --generate-notes || true
          fi
