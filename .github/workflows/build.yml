name: Build Agent Studio

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            agent-studio-react/package-lock.json
            agent-studio-tauri/package-lock.json

      - name: Install frontend dependencies
        working-directory: agent-studio-react
        run: npm ci

      - name: Install Tauri CLI
        working-directory: agent-studio-tauri
        run: npm ci

      - name: Build frontend
        working-directory: agent-studio-react
        run: npm run build

      - name: Build Tauri app
        working-directory: agent-studio-tauri
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Agent-Studio-Installer
          path: agent-studio-tauri/src-tauri/target/release/bundle/nsis/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: Agent-Studio-Installer

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.exe"
          generate_release_notes: true
