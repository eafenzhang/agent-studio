name: Build Agent Studio

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        shell: bash
        run: |
          VERSION=$(node -p "require('./agent-studio-react/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          # 用 node 代替 sed 更新版本文件（兼容 Windows）
          node -e "
            ['agent-studio-react/package.json',
             'agent-studio-tauri/package.json',
             'agent-studio-tauri/src-tauri/tauri.conf.json'].forEach(f => {
              let c = require('fs').readFileSync(f,'utf8');
              c = c.replace(/\"version\": \"$VERSION\"/g, '\"version\": \"$NEW_VERSION\"');
              require('fs').writeFileSync(f,c);
            });
            let c = require('fs').readFileSync('agent-studio-tauri/src-tauri/Cargo.toml','utf8');
            c = c.replace(/^version = \"$VERSION\"/m, 'version = \"$NEW_VERSION\"');
            require('fs').writeFileSync('agent-studio-tauri/src-tauri/Cargo.toml',c);
            console.log('Bumped to $NEW_VERSION');
          "
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump v$VERSION to v$NEW_VERSION" || true
          git tag "v$NEW_VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Build frontend
        working-directory: agent-studio-react
        run: |
          npm ci
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }

      - name: Build Tauri
        working-directory: agent-studio-tauri
        run: |
          npm ci
          npm run tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: agent-studio-tauri/src-tauri/target/release/bundle/nsis/*.exe

      - name: Push tag and release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin master
          git push origin -f "v${{ env.NEW_VERSION }}" || git push origin "v${{ env.NEW_VERSION }}"
          gh release create "v${{ env.NEW_VERSION }}" \
            agent-studio-tauri/src-tauri/target/release/bundle/nsis/*.exe \
            --generate-notes || true
