name: Build Agent Studio

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install dependencies
        working-directory: agent-studio-react
        run: npm ci

      - name: Build frontend
        working-directory: agent-studio-react
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }

      - name: Install Tauri CLI
        working-directory: agent-studio-tauri
        run: npm ci

      - name: Create placeholder sidecars
        shell: pwsh
        working-directory: agent-studio-tauri
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          [byte[]]$b = @(0x4d, 0x5a)
          Set-Content "src-tauri/binaries/aioncore-x86_64-pc-windows-msvc.exe" -Value $b -AsByteStream
          Set-Content "src-tauri/binaries/aionrs-x86_64-pc-windows-msvc.exe" -Value $b -AsByteStream

      - name: Build Tauri
        working-directory: agent-studio-tauri
        run: npm run tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: agent-studio-tauri/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        shell: bash
        run: |
          VERSION=$(node -p "require('./agent-studio-react/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          node -e "
            ['agent-studio-react/package.json',
             'agent-studio-tauri/package.json',
             'agent-studio-tauri/src-tauri/tauri.conf.json'].forEach(f => {
              let c = require('fs').readFileSync(f,'utf8');
              c = c.replace(/\"version\": \"$VERSION\"/g, '\"version\": \"$NEW_VERSION\"');
              require('fs').writeFileSync(f,c);
            });
            let c = require('fs').readFileSync('agent-studio-tauri/src-tauri/Cargo.toml','utf8');
            c = c.replace(/^version = \"$VERSION\"/m, 'version = \"$NEW_VERSION\"');
            require('fs').writeFileSync('agent-studio-tauri/src-tauri/Cargo.toml',c);
          "

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: installer

      - name: Commit, tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version" || true
          git tag -f "v${{ env.NEW_VERSION }}"
          git push origin master
          git push origin -f "v${{ env.NEW_VERSION }}"
          gh release create "v${{ env.NEW_VERSION }}" *.exe --generate-notes || gh release edit "v${{ env.NEW_VERSION }}" --notes "" || true
