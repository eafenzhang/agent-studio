name: Build Agent Studio

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }

      - name: Bump version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "NEW_VERSION=v$NEW_VERSION" >> "$GITHUB_ENV"
          echo "Bumping: $VERSION -> $NEW_VERSION"

          node -e "
            ['package.json',
             'src-tauri/tauri.conf.json'].forEach(f => {
              let c = require('fs').readFileSync(f,'utf8');
              c = c.replace(/\"version\": \"[0-9.]+\"/g, '\"version\": \"$NEW_VERSION\"');
              require('fs').writeFileSync(f,c);
            });
            let c = require('fs').readFileSync('src-tauri/Cargo.toml','utf8');
            c = c.replace(/^version = \"[0-9.]+\"/m, 'version = \"$NEW_VERSION\"');
            require('fs').writeFileSync('src-tauri/Cargo.toml',c);
          "

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Verify backend resource
        shell: pwsh
        run: |
          $file = "src-tauri/resources/aioncore.exe"
          if (Test-Path $file) {
            $size = (Get-Item $file).Length
            Write-Host "✅ aioncore.exe found: $([math]::Round($size/1MB, 1)) MB"
          } else {
            Write-Host "❌ aioncore.exe MISSING!"
            exit 1
          }

      - name: Build Tauri
        run: npm run tauri build

      - name: Verify installer
        shell: pwsh
        run: |
          $installers = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue
          $valid = $false
          foreach ($inst in $installers) {
            $size = [math]::Round($inst.Length/1MB, 1)
            Write-Host "📦 $($inst.Name): $size MB"
            if ($inst.Length -gt 15MB) { $valid = $true; $global:InstallerName = $inst.Name }
          }
          Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "📦 MSI $($_.Name): $([math]::Round($_.Length/1MB, 1)) MB"
          }
          if (-not $valid) { Write-Host "❌ No valid installer >15MB found"; exit 1 }

      - name: Upload installer (NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: installer-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload installer (MSI)
        uses: actions/upload-artifact@v4
        with:
          name: installer-msi
          path: src-tauri/target/release/bundle/msi/*.msi

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download NSIS installer
        uses: actions/download-artifact@v4
        with:
          name: installer-nsis

      - name: Download MSI installer
        uses: actions/download-artifact@v4
        with:
          name: installer-msi

      - name: Verify downloaded installer
        shell: bash
        run: |
          ls -la *.exe *.msi 2>/dev/null
          INSTALLER=$(ls *.exe 2>/dev/null | head -1)
          if [ -n "$INSTALLER" ]; then
            SIZE=$(stat -c%s "$INSTALLER" 2>/dev/null || wc -c < "$INSTALLER")
            [ "$SIZE" -lt 15000000 ] && { echo "❌ Installer too small"; exit 1; }
            echo "✅ Installer: $(($SIZE/1048576)) MB"
          fi

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "Releasing v$NEW_VERSION"

          # Commit version bump from build step
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to v$NEW_VERSION" || true
          git tag -f "v$NEW_VERSION"
          git push origin master
          git push origin -f "v$NEW_VERSION"

          NSIS=$(ls *.exe 2>/dev/null | head -1)
          MSI=$(ls *.msi 2>/dev/null | head -1)

          RELEASE_ARGS=("v$NEW_VERSION")
          [ -n "$NSIS" ] && RELEASE_ARGS+=("$NSIS")
          [ -n "$MSI" ] && RELEASE_ARGS+=("$MSI")

          if [ -n "$NSIS" ] || [ -n "$MSI" ]; then
            gh release create "${RELEASE_ARGS[@]}" --generate-notes || true
          else
            echo "❌ No installer found"
            gh release create "v$NEW_VERSION" --generate-notes || true
          fi

          # Update latest.json for auto-updater
          cat > latest.json << JSONEOF
          {
            "version": "$NEW_VERSION",
            "notes": "Agent Studio v$NEW_VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/v$NEW_VERSION/$NSIS"
              }
            }
          }
          JSONEOF
          git add latest.json
          git commit -m "chore: update latest.json for v$NEW_VERSION" || true
          git push origin master
