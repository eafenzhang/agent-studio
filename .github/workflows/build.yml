name: Build Agent Studio

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      app_version: ${{ steps.set_version.outputs.app_version }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }

      - name: Read and bump version
        id: set_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "app_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumping: $VERSION -> $NEW_VERSION"

          node -e "
            const fs=require('fs');
            const v = '$NEW_VERSION';
            ['package.json','src-tauri/tauri.conf.json'].forEach(f => {
              let c = fs.readFileSync(f,'utf8');
              c = c.replace(/\"version\": \"[0-9.]+\"/g, '\"version\": \"' + v + '\"');
              fs.writeFileSync(f,c);
            });
            let c = fs.readFileSync('src-tauri/Cargo.toml','utf8');
            c = c.replace(/^version = \"[0-9.]+\"/m, 'version = \"' + v + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml',c);
          "

      - name: Verify version
        shell: bash
        run: |
          echo "=== Version files after bump ==="
          echo "package.json: $(node -p "require('./package.json').version")"
          echo "Tauri conf: $(node -p "require('./src-tauri/tauri.conf.json').version")"
          grep '^version' src-tauri/Cargo.toml

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Build frontend
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Verify backend resource
        shell: pwsh
        run: |
          $file = "src-tauri/resources/aioncore.exe"
          if (Test-Path $file) {
            $size = (Get-Item $file).Length
            Write-Host "✅ aioncore.exe found: $([math]::Round($size/1MB, 1)) MB"
          } else {
            Write-Host "❌ aioncore.exe MISSING!"
            exit 1
          }

      - name: Build Tauri
        run: npm run tauri build

      - name: Verify installer
        shell: pwsh
        run: |
          Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "📦 NSIS $($_.Name): $([math]::Round($_.Length/1MB, 1)) MB"
          }
          Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "📦 MSI $($_.Name): $([math]::Round($_.Length/1MB, 1)) MB"
          }

      - name: Upload installer (NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: installer-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload installer (MSI)
        uses: actions/upload-artifact@v4
        with:
          name: installer-msi
          path: src-tauri/target/release/bundle/msi/*.msi

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download NSIS installer
        uses: actions/download-artifact@v4
        with:
          name: installer-nsis

      - name: Download MSI installer
        uses: actions/download-artifact@v4
        with:
          name: installer-msi

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ needs.build.outputs.app_version }}
        shell: bash
        run: |
          echo "=== Releasing v$NEW_VERSION ==="
          echo "Installer files:"
          ls -la *.exe *.msi 2>/dev/null || echo "(checking for installers)"

          # Bump version files to match the build version
          node -e "
            const fs=require('fs');
            const v = process.env.NEW_VERSION;
            ['package.json', 'src-tauri/tauri.conf.json'].forEach(f => {
              let c = fs.readFileSync(f,'utf8');
              c = c.replace(/\"version\": \"[0-9.]+\"/g, '\"version\": \"' + v + '\"');
              fs.writeFileSync(f,c);
            });
            let c = fs.readFileSync('src-tauri/Cargo.toml','utf8');
            c = c.replace(/^version = \"[0-9.]+\"/m, 'version = \"' + v + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml',c);
          "

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to v$NEW_VERSION" || true
          git tag -f "v$NEW_VERSION"
          git push origin master
          git push origin -f "v$NEW_VERSION"

          NSIS=$(ls *.exe 2>/dev/null | grep -v 'aioncore' | head -1)
          MSI=$(ls *.msi 2>/dev/null | head -1)

          echo "NSIS installer: $NSIS"
          echo "MSI installer: $MSI"

          RELEASE_ARGS=("v$NEW_VERSION")
          [ -n "$NSIS" ] && RELEASE_ARGS+=("$NSIS")
          [ -n "$MSI" ] && RELEASE_ARGS+=("$MSI")

          if [ -n "$NSIS" ] || [ -n "$MSI" ]; then
            gh release create "${RELEASE_ARGS[@]}" \
              --title "Agent Studio v$NEW_VERSION" \
              --notes "Agent Studio v$NEW_VERSION" || \
            gh release upload "v$NEW_VERSION" $(ls *.exe *.msi 2>/dev/null) --clobber || true
          fi

          # Update latest.json for auto-updater
          cat > latest.json << JSONEOF
          {
            "version": "$NEW_VERSION",
            "notes": "Agent Studio v$NEW_VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${{ github.repository }}/releases/download/v$NEW_VERSION/$NSIS"
              }
            }
          }
          JSONEOF
          git add latest.json
          git commit -m "chore: update latest.json for v$NEW_VERSION" || true
          git push origin master