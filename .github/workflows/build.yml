name: Build Agent Studio

on:
  push:
    branches:
      - master
    tags:
      - v*

permissions:
  contents: write

jobs:
  # ── 自动版本递增（仅 master 非 bump 提交触发）──
  bump-version:
    if: github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, 'chore: bump')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-bump patch version
        shell: bash
        run: |
          VERSION=$(node -p "require('./agent-studio-react/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "Bumping: $VERSION → $NEW_VERSION"

          for f in \
            agent-studio-react/package.json \
            agent-studio-tauri/package.json \
            agent-studio-tauri/src-tauri/tauri.conf.json; do
            sed -i "s/\"version\": \"$VERSION\"/\"version\": \"$NEW_VERSION\"/g" "$f"
          done
          sed -i "s/^version = \"$VERSION\"/version = \"$NEW_VERSION\"/" agent-studio-tauri/src-tauri/Cargo.toml
          sed -i "s/\"version\": \"$VERSION\"/\"version\": \"$NEW_VERSION\"/g" latest.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump v$VERSION to v$NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin master --tags

  # ── 构建（master 和 tag 都会构建）──
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install frontend deps
        working-directory: agent-studio-react
        run: npm ci
      - name: Install Tauri CLI
        working-directory: agent-studio-tauri
        run: npm ci
      - name: Build frontend
        working-directory: agent-studio-react
        run: npm run build
      - name: Placeholder sidecars
        shell: pwsh
        working-directory: agent-studio-tauri
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/binaries" | Out-Null
          [byte[]]$b = @(0x4d, 0x5a)
          Set-Content "src-tauri/binaries/aioncore-x86_64-pc-windows-msvc.exe" -Value $b -AsByteStream
          Set-Content "src-tauri/binaries/aionrs-x86_64-pc-windows-msvc.exe" -Value $b -AsByteStream
      - name: Build Tauri app
        working-directory: agent-studio-tauri
        run: npm run tauri build
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Agent-Studio-Installer
          path: agent-studio-tauri/src-tauri/target/release/bundle/nsis/*.exe

  # ── 发布（仅 tag 触发）──
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download installer
        uses: actions/download-artifact@v4
        with: { name: Agent-Studio-Installer }
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "*.exe"
          generate_release_notes: true
