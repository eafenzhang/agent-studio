name: Build Agent Studio

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build frontend
        working-directory: agent-studio-react
        run: |
          npm ci
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Tauri
        working-directory: agent-studio-tauri
        run: |
          npm ci
          npm run tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: agent-studio-tauri/src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          VERSION=$(node -p "require('./agent-studio-react/package.json').version")
          MAJOR=${VERSION%%.*}; REST=${VERSION#*.}
          MINOR=${REST%%.*}; PATCH=${REST#*.}
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          for f in agent-studio-react/package.json agent-studio-tauri/package.json \
                    agent-studio-tauri/src-tauri/tauri.conf.json; do
            sed -i "s/\"version\": \"$VERSION\"/\"version\": \"$NEW_VERSION\"/g" "$f"
          done
          sed -i "s/^version = \"$VERSION\"/version = \"$NEW_VERSION\"/" agent-studio-tauri/src-tauri/Cargo.toml

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: installer

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agent-studio-react/package.json agent-studio-tauri/package.json \
                  agent-studio-tauri/src-tauri/tauri.conf.json \
                  agent-studio-tauri/src-tauri/Cargo.toml
          git commit -m "chore: bump version" || true
          git tag -f "v${{ env.NEW_VERSION }}"

      - name: Push and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin master
          git push origin -f "v${{ env.NEW_VERSION }}"
          gh release create "v${{ env.NEW_VERSION }}" *.exe --generate-notes || true
